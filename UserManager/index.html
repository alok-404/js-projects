<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UserManager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="light-theme"> <div class="container">
    <div class="header-section">
      <h1>User Manager App</h1>
      <button id="themeToggle" class="secondary-btn">Toggle Theme</button>
    </div>

    <div class="search-container">
      <input type="text" id="searchInput" placeholder="Search by name..." />
      <button class="resetBtn">Reset Users</button>

    </div>

    <div class="add-user">
      <input type="text" id="nameInput" placeholder="Enter name" />
      <input type="email" id="emailInput" placeholder="Enter email" />
      <button id="addBtn">Add User</button>
    </div>

    <div class="table-header">
      <span class="col-user">User</span>
      <span class="col-action">Actions</span>
    </div>

    <div id="userList" class="user-list"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
